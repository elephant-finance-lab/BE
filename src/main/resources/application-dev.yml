app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:5173/auth/callback}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/login}
  auth:
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000
  refresh-expiration: 1209600000

kis:
  mode: real
  app-key: ${KIS_FINANCIAL_APP_KEY:}
  app-secret: ${KIS_FINANCIAL_APP_SECRET:}
  base-url: ${KIS_BASE_URL:}
  financial-app-key: ${KIS_FINANCIAL_APP_KEY:}
  financial-app-secret: ${KIS_FINANCIAL_APP_SECRET:}
  financial-base-url: ${KIS_FINANCIAL_BASE_URL:}
  websocket-url: ${KIS_WS_URL:}
  websocket-enabled: ${KIS_WEBSOCKET_ENABLED:true}

logging:
  level:
    org.springframework.security: DEBUG
    com.example: DEBUG

ai:
  server:
    host: ${AI_SERVER_HOST:localhost}
    port: ${AI_SERVER_PORT:50051}
    timeout: ${AI_SERVER_TIMEOUT:5}
  paper-auto:
    bundle-id: ${AI_PAPER_BUNDLE_ID:}
    confirm-phrase: ${AI_PAPER_CONFIRM_PHRASE:PAPER_AUTO_OK}
  recommendations:
    bundle-id: ${AI_RECOMMENDATION_BUNDLE_ID:}
    top-k: ${AI_RECOMMENDATION_TOP_K:10}
    include-diagnostics: ${AI_RECOMMENDATION_INCLUDE_DIAGNOSTICS:false}
    cache-read-enabled: ${AI_RECOMMENDATION_CACHE_READ_ENABLED:false}
    cache:
      max-age-seconds: ${AI_RECOMMENDATION_CACHE_MAX_AGE_SECONDS:180}
      max-future-skew-seconds: ${AI_RECOMMENDATION_CACHE_MAX_FUTURE_SKEW_SECONDS:5}
    refresh:
      enabled: ${AI_RECOMMENDATION_REFRESH_ENABLED:false}
      fixed-delay-ms: ${AI_RECOMMENDATION_REFRESH_FIXED_DELAY_MS:60000}
      initial-delay-ms: ${AI_RECOMMENDATION_REFRESH_INITIAL_DELAY_MS:10000}
      market-hours-only: ${AI_RECOMMENDATION_REFRESH_MARKET_HOURS_ONLY:true}
      market-open: ${AI_RECOMMENDATION_REFRESH_MARKET_OPEN:09:00}
      market-close: ${AI_RECOMMENDATION_REFRESH_MARKET_CLOSE:15:30}
      market-holidays: ${AI_RECOMMENDATION_REFRESH_MARKET_HOLIDAYS:2026-06-03,2026-07-17}

auto-trading:
  kafka:
    enabled: ${AUTO_TRADING_KAFKA_ENABLED:true}
    topic: ${AUTO_TRADING_KAFKA_TOPIC:${KAFKA_TOPIC:elephant-paper-trading-events}}
    group-id: ${AUTO_TRADING_KAFKA_GROUP_ID:elephant-be-auto-trading}
