server:
  forward-headers-strategy: framework

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://elephantfinancelab.site,https://www.elephantfinancelab.site,https://elephantfinancelab.vercel.app}
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:https://www.elephantfinancelab.site/auth/callback}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:https://www.elephantfinancelab.site/login}
  auth:
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:true}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000
  refresh-expiration: 1209600000

kis:
  mode: ${KIS_MODE:real}
  app-key: ${KIS_APP_KEY:${KIS_FINANCIAL_APP_KEY:}}
  app-secret: ${KIS_APP_SECRET:${KIS_FINANCIAL_APP_SECRET:}}
  base-url: ${KIS_BASE_URL:}
  financial-app-key: ${KIS_FINANCIAL_APP_KEY:${KIS_APP_KEY:}}
  financial-app-secret: ${KIS_FINANCIAL_APP_SECRET:${KIS_APP_SECRET:}}
  financial-base-url: ${KIS_FINANCIAL_BASE_URL:}
  websocket-url: ${KIS_WS_URL:}
  websocket-enabled: ${KIS_WEBSOCKET_ENABLED:true}
  account-number: ${KIS_ACCOUNT_NUMBER:}
  account-product-code: ${KIS_ACCOUNT_PRODUCT_CODE:}
  cano: ${KIS_CANO:}
  acnt-prdt-cd: ${KIS_ACNT_PRDT_CD:}

recommendation:
  fresh-max-age-sec: ${RECOMMENDATION_FRESH_MAX_AGE_SEC:${AI_RECOMMENDATION_CACHE_MAX_AGE_SECONDS:180}}
  display-max-age-sec: ${RECOMMENDATION_DISPLAY_MAX_AGE_SEC:${AI_RECOMMENDATION_CACHE_DISPLAY_MAX_AGE_SECONDS:${AI_RECOMMENDATION_CACHE_MAX_STALE_AGE_SECONDS:86400}}}
  allow-stale-fallback: ${RECOMMENDATION_ALLOW_STALE_FALLBACK:false}
  stale-fallback-max-age-sec: ${RECOMMENDATION_STALE_FALLBACK_MAX_AGE_SEC:86400}
  refresh-stale-before-return: ${RECOMMENDATION_REFRESH_STALE_BEFORE_RETURN:true}
  minimum-ai-response-count: ${RECOMMENDATION_MINIMUM_AI_RESPONSE_COUNT:${AI_RECOMMENDATION_TOP_K:10}}
  minimum-cache-batch-size: ${RECOMMENDATION_MINIMUM_CACHE_BATCH_SIZE:2}

logging:
  level:
    org.springframework.security: WARN
    com.example: INFO

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}

ai:
  server:
    host: ${AI_SERVER_HOST:localhost}
    port: ${AI_SERVER_PORT:50051}
    timeout: ${AI_SERVER_TIMEOUT:5}
    timeout-health: ${AI_SERVER_TIMEOUT_HEALTH:3}
    timeout-readiness: ${AI_SERVER_TIMEOUT_READINESS:10}
    timeout-recommendations: ${AI_SERVER_TIMEOUT_RECOMMENDATIONS:${AI_SERVER_RECOMMENDATIONS_TIMEOUT:90}}
    timeout-paper-start: ${AI_SERVER_TIMEOUT_PAPER_START:30}
    timeout-paper-status: ${AI_SERVER_TIMEOUT_PAPER_STATUS:5}
    timeout-paper-stop: ${AI_SERVER_TIMEOUT_PAPER_STOP:10}
  paper-auto:
    bundle-id: ${AI_PAPER_BUNDLE_ID:}
    confirm-phrase: ${AI_PAPER_CONFIRM_PHRASE:PAPER_AUTO_OK}
  recommendations:
    bundle-id: ${AI_RECOMMENDATION_BUNDLE_ID:}
    top-k: ${AI_RECOMMENDATION_TOP_K:10}
    include-diagnostics: ${AI_RECOMMENDATION_INCLUDE_DIAGNOSTICS:true}
    cache-read-enabled: ${AI_RECOMMENDATION_CACHE_READ_ENABLED:true}
    cache:
      max-age-seconds: ${recommendation.fresh-max-age-sec}
      display-max-age-seconds: ${recommendation.display-max-age-sec}
      allow-stale-display: ${AI_RECOMMENDATION_CACHE_ALLOW_STALE_DISPLAY:${AI_RECOMMENDATION_CACHE_SERVE_STALE:true}}
      max-future-skew-seconds: ${AI_RECOMMENDATION_CACHE_MAX_FUTURE_SKEW_SECONDS:5}
    refresh:
      enabled: ${AI_RECOMMENDATION_REFRESH_ENABLED:false}
      fixed-delay-ms: ${AI_RECOMMENDATION_REFRESH_FIXED_DELAY_MS:60000}
      initial-delay-ms: ${AI_RECOMMENDATION_REFRESH_INITIAL_DELAY_MS:1000}
      market-hours-only: ${AI_RECOMMENDATION_REFRESH_MARKET_HOURS_ONLY:true}
      market-open: ${AI_RECOMMENDATION_REFRESH_MARKET_OPEN:09:00}
      market-close: ${AI_RECOMMENDATION_REFRESH_MARKET_CLOSE:15:30}
      market-holidays: ${AI_RECOMMENDATION_REFRESH_MARKET_HOLIDAYS:2026-06-03,2026-07-17}

auto-trading:
  kafka:
    enabled: ${AUTO_TRADING_KAFKA_ENABLED:true}
    topic: ${AUTO_TRADING_KAFKA_TOPIC:${KAFKA_TOPIC:elephant-paper-trading-events}}
    group-id: ${AUTO_TRADING_KAFKA_GROUP_ID:elephant-be-auto-trading}
  operation:
    enabled: ${AUTO_TRADING_OPERATION_ENABLED:false}
    operator-email: ${AUTO_TRADING_OPERATION_OPERATOR_EMAIL:}
    dry-run: ${AUTO_TRADING_OPERATION_DRY_RUN:true}
    pre-open-cron: ${AUTO_TRADING_OPERATION_PRE_OPEN_CRON:0 30 8 * * MON-FRI}
    start-cron: ${AUTO_TRADING_OPERATION_START_CRON:0 1 9 * * MON-FRI}
    stop-cron: ${AUTO_TRADING_OPERATION_STOP_CRON:0 30 15 * * MON-FRI}
    monitor-fixed-delay-ms: ${AUTO_TRADING_OPERATION_MONITOR_FIXED_DELAY_MS:60000}
    monitor-initial-delay-ms: ${AUTO_TRADING_OPERATION_MONITOR_INITIAL_DELAY_MS:30000}
    purchase-option-id: ${AUTO_TRADING_OPERATION_PURCHASE_OPTION_ID:2}
    cycles: ${AUTO_TRADING_OPERATION_CYCLES:390}
    interval-sec: ${AUTO_TRADING_OPERATION_INTERVAL_SEC:60}
    retry-attempts: ${AUTO_TRADING_OPERATION_RETRY_ATTEMPTS:2}
    retry-backoff-ms: ${AUTO_TRADING_OPERATION_RETRY_BACKOFF_MS:1000}
    starting-timeout-minutes: ${AUTO_TRADING_OPERATION_STARTING_TIMEOUT_MINUTES:15}
    market-holidays: ${AUTO_TRADING_OPERATION_MARKET_HOLIDAYS:}
