app:
  seed:
    enabled: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:5173/auth/callback}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/login}
  auth:
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}

spring:
  application:
    name: "elephantfinancelab"

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            client-name: Naver
            scope:
              - name
              - email
              - profile_image
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            client-name: Kakao
            scope:
              - profile_nickname
              - account_email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000
  refresh-expiration: 1209600000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

kis:
  app-key: ${KIS_APP_KEY}
  app-secret: ${KIS_APP_SECRET}
  base-url: ${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
  financial-app-key: ${KIS_FINANCIAL_APP_KEY}
  financial-app-secret: ${KIS_FINANCIAL_APP_SECRET}
  websocket-url: ${KIS_WS_URL:ws://ops.koreainvestment.com:21000}

logging:
  level:
    org.springframework.security: DEBUG
    com.example: DEBUG

ai:
  server:
    host: ${AI_SERVER_HOST:localhost}
    port: ${AI_SERVER_PORT:50051}
    timeout: ${AI_SERVER_TIMEOUT:5}
  paper-auto:
    bundle-id: ${AI_PAPER_BUNDLE_ID:}
    confirm-phrase: ${AI_PAPER_CONFIRM_PHRASE:PAPER_AUTO_OK}

auto-trading:
  kafka:
    enabled: ${AUTO_TRADING_KAFKA_ENABLED:true}
    topic: ${AUTO_TRADING_KAFKA_TOPIC:${KAFKA_TOPIC:elephant-paper-trading-events}}
    group-id: ${AUTO_TRADING_KAFKA_GROUP_ID:elephant-be-auto-trading}

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health
  metrics:
    export:
      prometheus:
        enabled: true