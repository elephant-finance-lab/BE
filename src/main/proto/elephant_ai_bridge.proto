syntax = "proto3";

package elephant.ai.v1;

option java_multiple_files = true;
option java_outer_classname = "ElephantAiBridgeProto";
option java_package = "com.elephant.ai.v1";

// Elephant Lab AI <-> BE gRPC bridge.
//
// SSOT alignment:
// - PortfolioPatchEnvelope mirrors api_contracts.md C8.
// - FinalDecisionEnvelope mirrors api_contracts.md C9.
// - ExecutionFeedbackEnvelope mirrors api_contracts.md C10.
// - InternalMessageEnvelope / AgentReportEnvelope mirror C4/C5 transport needs.
//
// Safety:
// - This contract does not authorize live trading.
// - live_trading_allowed must stay false unless a separate explicit live gate is
//   approved outside this gRPC transport layer.
// - FDA can only approve/veto; target_weights and order_deltas remain read-only
//   echoes in FinalDecisionEnvelope.
service AiBeBridgeService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetServiceReadiness(ServiceReadinessRequest) returns (ServiceReadinessResponse);

  // gRPC replacements for the reviewed HTTP/OpenAPI bridge endpoints.
  rpc PublishPortfolioPatch(PortfolioPatchEnvelope) returns (Ack);
  rpc PublishFinalDecision(FinalDecisionEnvelope) returns (Ack);
  rpc PublishExecutionFeedback(ExecutionFeedbackEnvelope) returns (Ack);
  rpc PublishInternalMessage(InternalMessageEnvelope) returns (Ack);
  rpc PublishAgentReport(AgentReportEnvelope) returns (Ack);

  // Read-only model recommendation list for BE dashboard/search UI.
  // This does not authorize orders and never enables live trading.
  rpc GetRecommendations(GetRecommendationsRequest) returns (GetRecommendationsResponse);

  // Paper auto trading lifecycle.
  // BE에서 Start 요청 시 PaperAutoTrader를 비동기로 실행.
  // 동시 1세션만 허용 (session lock).
  rpc StartPaperAutoTrading(StartPaperAutoTradingRequest) returns (StartPaperAutoTradingResponse);
  rpc StopPaperAutoTrading(StopPaperAutoTradingRequest) returns (StopPaperAutoTradingResponse);
  rpc GetPaperAutoTradingStatus(GetPaperAutoTradingStatusRequest) returns (PaperAutoTradingStatusResponse);
}

message HealthCheckRequest {
  string request_id = 1;
  string bundle_id = 2;
}

message HealthCheckResponse {
  string request_id = 1;
  string status = 2;
  string generated_at = 3;
  string transport = 4;
  string bundle_id = 5;
  bool live_trading_allowed = 6;
  bool production_registry_mutated = 7;
  string production_active_version = 8;
  string message = 9;
}

message ServiceReadinessRequest {
  string request_id = 1;
  string bundle_id = 2;
  bool include_details = 3;
}

message ServiceReadinessResponse {
  string request_id = 1;
  string status = 2;
  string generated_at = 3;
  string bundle_id = 4;
  string deploy_quality = 5;
  string broker_evidence = 6;
  bool live_trading_allowed = 7;
  bool registry_mutated = 8;
  bool safe_to_show_dashboard = 9;
  bool safe_to_enable_order_actions = 10;
  bool safe_to_enable_live_actions = 11;
  string details_json = 12;
}

message Ack {
  string request_id = 1;
  bool accepted = 2;
  string status = 3;
  string reason = 4;
  string received_at = 5;
  string idempotency_key = 6;
}

message GetRecommendationsRequest {
  string request_id = 1;
  string bundle_id = 2;
  string asof = 3;
  repeated string tickers = 4;
  int32 top_k = 5;
  bool include_diagnostics = 6;
}

message RecommendationItem {
  string recommendation_id = 1;
  string request_id = 2;
  string stock_code = 3;
  string ticker = 4;
  string stock_name = 5;
  int32 ranking = 6;
  double score = 7;
  string reason = 8;
  double expected_return = 9;
  bool expected_return_available = 10;
  string risk_level = 11;
  string model_version = 12;
  string bundle_id = 13;
}

message GetRecommendationsResponse {
  string request_id = 1;
  string status = 2;
  string reason = 3;
  string generated_at = 4;
  string bundle_id = 5;
  string model_version = 6;
  string asof = 7;
  string mode = 8;
  repeated RecommendationItem recommendations = 9;
  bool live_trading_allowed = 10;
  bool registry_mutated = 11;
  string diagnostics_json = 12;
}

message OrderDelta {
  string ticker = 1;
  string side = 2;
  int64 qty = 3;
  string reason = 4;
  double price = 5;
}

message Fill {
  string ticker = 1;
  string side = 2;
  int64 qty = 3;
  double avg_fill_price = 4;
  string fill_ts = 5;
}

message RiskOverride {
  string rule = 1;
  string original = 2;
  string override = 3;
  string justification = 4;
}

message PortfolioPatchEnvelope {
  string request_id = 1;
  string portfolio_patch_id = 2;
  string based_on_ts = 3;
  map<string, double> target_weights = 4;
  repeated OrderDelta order_deltas = 5;
  string source = 6;
  string idempotency_key = 7;
  string metadata_json = 8;
}

message FinalDecisionEnvelope {
  string request_id = 1;
  string decision_id = 2;
  bool approved = 3;
  map<string, double> target_weights = 4;
  repeated OrderDelta order_deltas = 5;
  string veto_reason = 6;
  string reason_code = 7;
  repeated RiskOverride risk_overrides = 8;
  double confidence = 9;
  string expiry = 10;
  string portfolio_patch_ref = 11;
  repeated string active_reports = 12;
  string source = 13;
  string idempotency_key = 14;
  string metadata_json = 15;
}

message ExecutionFeedbackEnvelope {
  string request_id = 1;
  string final_decision_ref = 2;
  bool approved = 3;
  repeated OrderDelta order_deltas = 4;
  string execution_mode = 5;
  bool live_enabled = 6;
  string order_plan_id = 7;
  string submitted_at = 8;
  string status = 9;
  repeated Fill fills = 10;
  double estimated_cost = 11;
  double realized_slippage = 12;
  string kb_message_id = 13;
  double pnl_contribution = 14;
  double execution_shortfall = 15;
  string lesson_stub = 16;
  string idempotency_key = 17;
  string metadata_json = 18;
}

message InternalMessageEnvelope {
  string request_id = 1;
  string message_id = 2;
  string channel = 3;
  string publisher = 4;
  string created_at = 5;
  string expires_at = 6;
  string payload_json = 7;
  string idempotency_key = 8;
}

message AgentReportEnvelope {
  string request_id = 1;
  string report_id = 2;
  string agent_name = 3;
  string status = 4;
  string generated_at = 5;
  string summary = 6;
  string payload_json = 7;
  string idempotency_key = 8;
}

// ── Paper Auto Trading ──────────────────────────────────────

message StartPaperAutoTradingRequest {
  string request_id = 1;
  string bundle_id = 2;
  int32 cycles = 3;
  int32 interval_sec = 4;
  repeated string tickers = 5;
  string confirm_phrase = 6;
}

message StartPaperAutoTradingResponse {
  string request_id = 1;
  bool accepted = 2;
  string status = 3;
  string reason = 4;
  string session_id = 5;
  string started_at = 6;
}

message StopPaperAutoTradingRequest {
  string request_id = 1;
  string session_id = 2;
}

message StopPaperAutoTradingResponse {
  string request_id = 1;
  bool accepted = 2;
  string status = 3;
  string reason = 4;
  string stopped_at = 5;
}

message GetPaperAutoTradingStatusRequest {
  string request_id = 1;
}

message PaperAutoTradingStatusResponse {
  string request_id = 1;
  bool running = 2;
  string session_id = 3;
  string status = 4;
  int32 completed_cycles = 5;
  int32 total_cycles = 6;
  string started_at = 7;
  string bundle_id = 8;
  string last_cycle_at = 9;
  bool stop_requested = 10;
  string terminal_status = 11;
  string stop_reason = 12;
  string ended_at = 13;
  string report_path = 14;
  bool kafka_connected = 15;
  string kafka_topic = 16;
  string kafka_last_error = 17;
  string last_error = 18;
}
