app:
  seed:
    enabled: false

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

springdoc:
  swagger-ui:
    enabled: false

jwt:
  secret: test-secret-key-must-be-at-least-32-characters-long
  access-expiration: 1800000
  refresh-expiration: 1209600000

kis:
  app-key: test-app-key
  app-secret: test-app-secret
  base-url: https://openapi.koreainvestment.com:9443
  websocket-url: ws://ops.koreainvestment.com:21000
  websocket-enabled: false

ai:
  server:
    host: localhost
    port: 50051
    timeout: 5
  paper-auto:
    bundle-id: BUNDLE-TEST
    confirm-phrase: PAPER_AUTO_OK

auto-trading:
  kafka:
    enabled: false
    topic: elephant-paper-trading-events
    group-id: elephant-be-auto-trading-test

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health
  metrics:
    export:
      prometheus:
        enabled: true
