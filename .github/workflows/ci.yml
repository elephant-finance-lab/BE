name: Java CI with Gradle

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Lint (Spotless)
        run: ./gradlew spotlessCheck

      - name: Run tests
        run: ./gradlew test
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  # 배포 Job (Push일 때만 실행 = 머지 되었을 때)
  deploy:
    needs: build-and-test # 테스트가 통과해야만 실행됨
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Ready for deploy
        run: echo "여기에 배포 스크립트를 작성합니다 (SSH 접속, Docker 빌드 등)"
        # 실제 배포 로직은 서버 환경(AWS EC2, Docker 등)에 따라 추가해야 합니다.