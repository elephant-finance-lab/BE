name: Deploy to EC2

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean bootJar -x test

      - name: Copy Jar to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo fuser -k 8080/tcp || true

            cd /home/ubuntu/app

            if [ -f ~/.env ]; then
              set -a
              . ~/.env
              set +a
            else
              echo "~/.env file not found"
            fi

            JAR_FILE=$(ls -t *.jar 2>/dev/null | head -n 1)

            if [ -z "$JAR_FILE" ]; then
              echo "No jar file found in /home/ubuntu/app"
              exit 1
            fi

            echo "Starting $JAR_FILE"
            nohup java -jar "$JAR_FILE" > app.log 2>&1 < /dev/null &

            sleep 15

            if pgrep -f "java -jar.*$JAR_FILE" > /dev/null; then
              echo "Application process is running"
            else
              echo "Application process is not running"
              tail -n 100 app.log
              exit 1
            fi

            sudo lsof -i :8080 || true
