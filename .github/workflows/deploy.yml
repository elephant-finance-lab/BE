name: Deploy to EC2

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: be-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Test and Build
        run: ./gradlew clean test bootJar

      - name: Show artifact
        run: ls -lh build/libs

      - name: Copy Jar to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app

            PREVIOUS_JAR=$(readlink app.jar || true)
            JAR_FILE=$(find . -maxdepth 1 -type f -name "*.jar" ! -name "*-plain.jar" -printf "%T@ %f\n" | sort -nr | head -n 1 | cut -d' ' -f2-)

            if [ -z "$JAR_FILE" ]; then
              echo "No jar file found in /home/ubuntu/app"
              exit 1
            fi

            ln -sfn "$JAR_FILE" app.jar

            sudo systemctl daemon-reload
            sudo systemctl restart elephant.service

            for attempt in $(seq 1 12); do
                if curl --fail --silent --show-error --connect-timeout 2 --max-time 5 http://127.0.0.1:8080/api/chart/market > /dev/null; then                echo "Application health check passed"
                sudo systemctl status elephant.service --no-pager
                exit 0
              fi
              sleep 5
            done

            echo "Application health check failed"
            sudo systemctl status elephant.service --no-pager || true
            sudo journalctl -u elephant.service -n 100 --no-pager

            if [ -n "$PREVIOUS_JAR" ] && [ -f "$PREVIOUS_JAR" ]; then
              echo "Rolling back to $PREVIOUS_JAR"
              ln -sfn "$PREVIOUS_JAR" app.jar
              sudo systemctl restart elephant.service
            fi

            exit 1
