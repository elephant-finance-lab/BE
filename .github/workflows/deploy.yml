name: Deploy to EC2

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean bootJar -x test

      - name: Copy Jar to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app

            JAR_FILE=$(ls -t *.jar 2>/dev/null | head -n 1)

            if [ -z "$JAR_FILE" ]; then
              echo "No jar file found in /home/ubuntu/app"
              exit 1
            fi

            ln -sfn "$JAR_FILE" app.jar

            sudo systemctl daemon-reload
            sudo systemctl restart elephant.service

            sleep 10

            if sudo systemctl is-active --quiet elephant.service; then
              echo "elephant.service is running"
              sudo systemctl status elephant.service --no-pager
            else
              echo "elephant.service failed to start"
              sudo systemctl status elephant.service --no-pager || true
              sudo journalctl -u elephant.service -n 100 --no-pager
              exit 1
            fi
