plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.3'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.diffplug.spotless' version '6.25.0'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	compileOnly 'org.projectlombok:lombok'
	runtimeOnly 'org.postgresql:postgresql'
	runtimeOnly 'com.h2database:h2'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-security-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	testRuntimeOnly 'com.h2database:h2'

	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.0'

}

spotless {
	java {
		// Google Java Format 적용
		googleJavaFormat()
		removeUnusedImports()
		trimTrailingWhitespace()
		endWithNewline()

		targetExclude 'build/**'
	}
}

// 기본: 테스트 실행 ON. 로컬에서만 건너뛸 때: ./gradlew build -PskipTests=true (또는 ./gradlew build -x test)
def skipTests =
		(findProperty('skipTests') ?: 'false').toString().toBoolean()

tasks.named('test') {
	useJUnitPlatform()
	enabled = !skipTests
}

def querydslDir = "src/main/generated"

sourceSets {
	main.java.srcDirs += [ querydslDir ]
}

tasks.named('compileJava', JavaCompile) {
	options.generatedSourceOutputDirectory.set(file(querydslDir))
}

tasks.named('compileTestJava', JavaCompile) {
	options.generatedSourceOutputDirectory.set(
		file("$buildDir/generated/sources/annotationProcessor/java/test")
	)
}

clean.doLast {
	file(querydslDir).deleteDir()
}
